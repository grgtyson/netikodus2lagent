<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Netikodu — Vestlused</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e8e8e8; height: 100vh; display: flex; flex-direction: column; }
    
    .topbar { display: flex; border-bottom: 1px solid #222; }
    .tab { padding: 14px 24px; font-size: 13px; cursor: pointer; color: #666; border-bottom: 2px solid transparent; }
    .tab.active { color: #e8e8e8; border-bottom-color: #3b82f6; }
    
    .content { flex: 1; display: flex; overflow: hidden; }
    
    /* Vestlused */
    .sidebar { width: 320px; border-right: 1px solid #222; display: flex; flex-direction: column; }
    .sidebar-header { padding: 20px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
    .sidebar-header h1 { font-size: 15px; font-weight: 600; color: #fff; }
    .sidebar-header span { font-size: 12px; color: #555; }
    .conversations { flex: 1; overflow-y: auto; }
    .conv-item { padding: 16px 20px; border-bottom: 1px solid #1a1a1a; cursor: pointer; transition: background 0.15s; }
    .conv-item:hover { background: #161616; }
    .conv-item.active { background: #1a1a1a; border-left: 2px solid #3b82f6; }
    .conv-phone { font-size: 14px; font-weight: 500; }
    .conv-preview { font-size: 12px; color: #555; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .conv-time { font-size: 11px; color: #444; margin-top: 4px; }
    
    .main { flex: 1; display: flex; flex-direction: column; }
    .main-header { padding: 16px 24px; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: space-between; }
    .main-header h2 { font-size: 15px; font-weight: 500; }
    .messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 12px; }
    .msg-wrap { display: flex; flex-direction: column; }
    .msg-wrap.assistant { align-items: flex-end; }
    .msg { max-width: 70%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
    .msg.user { background: #1e1e1e; border: 1px solid #2a2a2a; }
    .msg.assistant { background: #1d3a6e; }
    .msg-meta { font-size: 11px; color: #444; margin-top: 4px; }
    .empty { flex: 1; display: flex; align-items: center; justify-content: center; color: #333; font-size: 14px; }
    
    /* Prompt */
    .prompt-page { flex: 1; padding: 32px; display: flex; flex-direction: column; gap: 16px; max-width: 800px; }
    .prompt-page h2 { font-size: 16px; font-weight: 600; }
    .prompt-page p { font-size: 13px; color: #666; }
    .prompt-page textarea { flex: 1; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 16px; color: #e8e8e8; font-size: 13px; line-height: 1.6; resize: none; min-height: 300px; font-family: inherit; }
    .prompt-page textarea:focus { outline: none; border-color: #3b82f6; }
    .save-btn { background: #3b82f6; color: #fff; border: none; padding: 10px 20px; border-radius: 6px; font-size: 13px; cursor: pointer; align-self: flex-start; }
    .save-btn:hover { background: #2563eb; }
    .save-msg { font-size: 12px; color: #22c55e; display: none; }

    .refresh-btn { background: #1e1e1e; border: 1px solid #2a2a2a; color: #aaa; padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; }
    .refresh-btn:hover { background: #252525; color: #e8e8e8; }

    .page { display: none; }
    .page.active { display: flex; flex: 1; overflow: hidden; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="tab active" onclick="showTab('conversations', this)">Vestlused</div>
  <div class="tab" onclick="showTab('prompt', this)">AI Prompt</div>
</div>

<div class="content">
  <!-- Vestlused -->
  <div class="page active" id="page-conversations">
    <div class="sidebar">
      <div class="sidebar-header">
        <h1>Vestlused</h1>
        <span id="conv-count">0</span>
      </div>
      <div class="conversations" id="conv-list"></div>
    </div>
    <div class="main">
      <div class="main-header">
        <h2 id="active-phone">Vali vestlus</h2>
        <button class="refresh-btn" onclick="loadConversations()">↻ Uuenda</button>
      </div>
      <div class="messages" id="messages">
        <div class="empty">Vali vasakult vestlus</div>
      </div>
    </div>
  </div>

  <!-- Prompt -->
  <div class="page" id="page-prompt">
    <div class="prompt-page">
      <h2>AI Prompt</h2>
      <p>See on juhis, mida AI kasutab igal vestlusel. Muuda seda vastavalt oma teenusele.</p>
      <textarea id="prompt-text" placeholder="Laadin..."></textarea>
      <div style="display:flex; align-items:center; gap:12px;">
        <button class="save-btn" onclick="savePrompt()">Salvesta</button>
        <span class="save-msg" id="save-msg">✓ Salvestatud</span>
      </div>
    </div>
  </div>
</div>

<script>
  const API = window.location.origin;
  let conversations = [];
  let activeId = null;

  function showTab(tab, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('page-' + tab).classList.add('active');
    if (tab === 'prompt') loadPrompt();
  }

  async function loadConversations() {
    try {
      const res = await fetch(`${API}/conversations`);
      conversations = await res.json();
      document.getElementById('conv-count').textContent = conversations.length;
      const list = document.getElementById('conv-list');
      list.innerHTML = '';
      conversations.forEach(conv => {
        const msgs = conv.messages || [];
        const last = msgs[msgs.length - 1];
        const div = document.createElement('div');
        div.className = 'conv-item' + (conv.id === activeId ? ' active' : '');
        div.innerHTML = `
          <div class="conv-phone">+${conv.phone_number}</div>
          <div class="conv-preview">${last ? last.content : 'Sõnumeid pole'}</div>
          <div class="conv-time">${new Date(conv.created_at).toLocaleString('et-EE')}</div>
        `;
        div.onclick = () => showConversation(conv.id, div);
        list.appendChild(div);
      });
    } catch(e) {
      console.error(e);
    }
  }

  function showConversation(id, el) {
    activeId = id;
    const conv = conversations.find(c => c.id === id);
    if (!conv) return;
    document.querySelectorAll('.conv-item').forEach(e => e.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('active-phone').textContent = `+${conv.phone_number}`;
    const msgs = conv.messages || [];
    const container = document.getElementById('messages');
    if (msgs.length === 0) {
      container.innerHTML = '<div class="empty">Sõnumeid pole</div>';
      return;
    }
    container.innerHTML = msgs.map(m => `
      <div class="msg-wrap ${m.role}">
        <div class="msg ${m.role}">${m.content}</div>
        <div class="msg-meta">${m.role === 'user' ? 'Klient' : 'AI'} · ${new Date(m.created_at).toLocaleTimeString('et-EE')}</div>
      </div>
    `).join('');
    container.scrollTop = container.scrollHeight;
  }

  async function loadPrompt() {
    const res = await fetch(`${API}/prompt`);
    const data = await res.json();
    document.getElementById('prompt-text').value = data.prompt;
  }

  async function savePrompt() {
    const prompt = document.getElementById('prompt-text').value;
    await fetch(`${API}/prompt`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt })
    });
    const msg = document.getElementById('save-msg');
    msg.style.display = 'block';
    setTimeout(() => msg.style.display = 'none', 3000);
  }

  loadConversations();
  setInterval(loadConversations, 30000);
</script>

</body>
</html>
